    <style>
        /* CORE TERMINAL STYLING */
        :root {
            --bg-color: #0b0b0b;
            --text-color: #e0e0e0;
            --prompt-user: #ff5555; /* Kali Root Red */
            --prompt-path: #5555ff; /* Kali Path Blue */
            --cmd-color: #ffffff;
            --comment-color: #828282;
            --green: #00ff00;
            --font-stack: 'Fira Code', 'Source Code Pro', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            font-size: 16px;
            line-height: 1.4;
            overflow-x: hidden; /* Prevent horizontal scroll */
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* TERMINAL CONTAINER */
        #terminal {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 50px; /* Space for fixed status bar if needed */
        }

        /* SCROLLBAR STYLING (Webkit) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* TERMINAL ELEMENTS */
        .line {
            display: block;
            margin-bottom: 2px;
            word-wrap: break-word;
            white-space: pre-wrap; /* Preserve formatting */
        }

        .prompt-line {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .prompt-text {
            margin-right: 8px;
            white-space: nowrap;
        }
        
        .user { color: var(--prompt-user); font-weight: bold; }
        .at { color: var(--text-color); }
        .host { color: var(--text-color); font-weight: bold; }
        .path { color: var(--prompt-path); font-weight: bold; }
        .symbol { color: var(--text-color); }

        .command-text {
            color: var(--cmd-color);
            font-weight: bold;
        }

        .output {
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .comment {
            color: var(--comment-color);
            font-style: italic;
            display: block;
            margin-top: 5px;
            border-left: 2px solid var(--comment-color);
            padding-left: 10px;
        }

        /* SPECIAL OUTPUT STYLES */
        .highlight { color: var(--green); }
        .error { color: #ff5555; }
        .directory { color: #5555ff; font-weight: bold; }
        .executable { color: #55ff55; font-weight: bold; }
        
        /* IMAGE MOCKUP (ASCII/CSS BOX) */
        .img-mock {
            border: 1px dashed #444;
            background: #111;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.8rem;
            color: #aaa;
            display: inline-block;
            max-width: 100%;
        }

        /* CURSOR BLINK */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #ccc;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        .cursor.typing {
            animation: none;
            opacity: 1;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* STATUS BAR */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1a1a1a;
            color: #888;
            padding: 5px 20px;
            font-size: 12px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .hidden { display: none; }
    </style>

    // -- ENGINE FUNCTIONS --

    function createPrompt(path) {
        const div = document.createElement('div');
        div.className = 'prompt-line';
        div.innerHTML = `
            <span class="prompt-text">
                <span class="user">root@kali</span><span class="symbol">:</span><span class="path">${path}</span><span class="symbol">#</span>
            </span>
            <span class="command-text"></span>
            <span class="cursor"></span>
        `;
        return div;
    }

    function createOutput(html) {
        const div = document.createElement('div');
        div.className = 'line output';
        div.innerHTML = html;
        return div;
    }

    function createComment(text) {
        const div = document.createElement('div');
        div.className = 'line comment';
        div.innerText = '# ' + text;
        return div;
    }

    function scrollToBottom() {
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function executeStep() {
        if (currentStepIndex >= content.length) return;

        const step = content[currentStepIndex];
        
        // Remove previous cursor if exists
        const prevCursor = document.querySelector('.cursor');
        if (prevCursor) prevCursor.remove();

        if (step.type === 'clear') {
            terminal.innerHTML = '';
            currentStepIndex++;
            addBlankPrompt(); // Ready for next
            return;
        }

        if (step.type === 'comment') {
            terminal.appendChild(createComment(step.text));
            currentStepIndex++;
            scrollToBottom();
            // Automatically queue next prompt
            addBlankPrompt(); 
            return;
        }

        if (step.type === 'command') {
            // Create prompt
            const promptLine = createPrompt(step.path);
            terminal.appendChild(promptLine);
            scrollToBottom();

            const cmdSpan = promptLine.querySelector('.command-text');
            const cursor = promptLine.querySelector('.cursor');
            cursor.classList.add('typing'); // Stop blinking while typing

            isTyping = true;
            await typeCommand(step.cmd, cmdSpan);
            isTyping = false;
            
            cursor.classList.remove('typing'); // Blink again

            // Wait a tiny bit then show output
            setTimeout(() => {
                if (step.output) {
                    terminal.appendChild(createOutput(step.output));
                }
                currentStepIndex++;
                scrollToBottom();
                
                // Add a blinking cursor at the bottom to show waiting state
                if (currentStepIndex < content.length) {
                    const nextStep = content[currentStepIndex];
                    if(nextStep.type !== 'clear') { 
                        // If next is clear, we wait for user. 
                        // If next is content, we essentially pause here.
                    }
                }
            }, 300);
        }
    }

    // Typewriter effect
    function typeCommand(text, element) {
        return new Promise(resolve => {
            let i = 0;
            function typeChar() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    // Random typing variance for realism
                    const speed = 30 + Math.random() * 50; 
                    currentTypingTimeout = setTimeout(typeChar, speed);
                } else {
                    resolve();
                }
                scrollToBottom();
            }
            typeChar();
        });
    }

    function finishTypingImmediately() {
        if (!isTyping) return;
        clearTimeout(currentTypingTimeout);
        const step = content[currentStepIndex];
        const prompts = document.querySelectorAll('.prompt-line');
        const currentPrompt = prompts[prompts.length - 1];
        const cmdSpan = currentPrompt.querySelector('.command-text');
        
        cmdSpan.textContent = step.cmd; // Fill text
        isTyping = false;
        
        // Trigger the output logic immediately
        setTimeout(() => {
             if (step.output) {
                terminal.appendChild(createOutput(step.output));
            }
            currentStepIndex++;
            scrollToBottom();
        }, 100);
    }

    function addBlankPrompt() {
        // Only add if last element isn't already an empty prompt
        const last = terminal.lastElementChild;
        // Logic to determine if we need a waiting cursor
        // For simplicity in this linear presentation, we generate prompts on the fly in executeStep
        // But for 'waiting' state between commands, we can just leave the last output hanging.
        
        // However, to mimic a real shell, usually prompt appears AFTER output.
        // Let's create a "ghost" prompt for the next step?
        // Actually, executeStep creates the prompt for the command it is about to run.
        // So we don't need a blank prompt waiting, unless we are at the very end.
    }

    // -- INITIALIZATION --

    // Add initial blank prompt
    const initialPrompt = createPrompt('~');
    terminal.appendChild(initialPrompt);
    
    // Create a fake "start" step to handle the first user interaction gracefully
    // We replace the initial blank prompt when user presses space
    
    // -- EVENT LISTENERS --

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault(); // Prevent scrolling

            if (isTyping) {
                finishTypingImmediately();
            } else {
                // Remove the "waiting" cursor from previous block if it exists
                const cursors = document.querySelectorAll('.cursor');
                cursors.forEach(c => c.remove());
                
                executeStep();
            }
        }
    });

    // Handle touch for mobile
    document.addEventListener('touchstart', (e) => {
        if (isTyping) {
            finishTypingImmediately();
        } else {
            const cursors = document.querySelectorAll('.cursor');
            cursors.forEach(c => c.remove());
            executeStep();
        }
    });

    // Start prompt focus
